name: Android Build

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install NDK
              run: sdkmanager "ndk;27.2.12479018"

            - name: Install Rust (arm64 only)
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-linux-android

            - name: Cache Rust build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: Install JS dependencies
              run: pnpm install

            - name: Build Android APK (arm64 debug)
              env:
                  NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
              run: pnpm tauri android build --debug --target aarch64

            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                  name: novads-arm64-debug
                  path: src-tauri/gen/android/app/build/outputs/apk/arm64/debug/app-arm64-debug.apk
                  if-no-files-found: error
